[program:icmqtt-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/mqttbe/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/html/mqttbe/storage/logs/worker.log
stopwaitsecs=3600

[program:icmqtt-scheduler]
process_name=%(program_name)s
command=php /var/www/html/mqttbe/artisan schedule:work
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/html/mqttbe/storage/logs/scheduler.log

; Per-user MQTT listeners are no longer managed as a shared Supervisor program.
; They are started from the application with user-specific credentials/device IDs
; and restored after reboot via:
;     php artisan mqtt:listeners:restore
;
; Subscription expiry checking is handled by Laravel Scheduler via schedule:work,
; so a dedicated one-shot supervisor program is not needed here.